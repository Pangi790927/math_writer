a:
  m_type: ast_var_t
  m_name: a

b:
  m_type: ast_var_t
  m_name: b

n1:
  m_type: ast_integer_t
  m_value: 10

fn_sqrt:
  m_type: ast_var_t
  m_name: sqrt

fn_f:
  m_type: ast_var_t
  m_name: f
  m_flags: AST_FLAG_RANDOM_FLAG

c:
  m_type: ast_node_t
  m_op: AST_NODE_ADD
  m_childs:
    - !ref a
    - !ref b
    - !ref n1

d:
  m_type: ast_node_t
  m_op: AST_NODE_MUL
  m_childs:
    - !ref a
    - !ref b
    - !ref n1

e1:
  m_type: ast_node_t
  m_op: AST_NODE_FN_CALL
  m_childs:
    - !ref fn_f
    - !ref a
    - !ref b
    - !ref c
    - !ref d

e2:
  m_type: ast_node_t
  m_op: AST_NODE_FN_CALL
  m_childs:
    - !ref fn_sqrt
    - !ref e1

l1:
  m_type: ast_node_t
  m_op: AST_NODE_LIST
  m_childs:
    - !ref a
    - !ref b
    - !ref n1 

main_script:
    m_type: vc::lua_script_t
    m_source_path: ./main.lua
